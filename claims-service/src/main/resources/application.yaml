spring:
  application:
    name: claims-service

  # Configuración de R2DBC (Persistencia Reactiva)
  r2dbc:
    url: ${DB_R2DBC_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  # Configuración de DataSource (Persistencia JDBC para Flyway)
  datasource:
    url: ${DB_JDBC_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.h2.Driver

  # Configuración de Migraciones con Flyway
  flyway:
    enabled: true
    url: ${DB_JDBC_URL}
    user: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    baseline-on-migrate: true

server:
  port: ${PORT:8080}

# Configuración de Seguridad y JWT
security:
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION}

    
logging:
  level:
    org:
      springframework:
        r2dbc: DEBUG

