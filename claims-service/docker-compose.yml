name: pacifico-claim
version: '3.8'

networks:
  pacifico-network:
    driver: bridge

services:
  # Microservicio claims-service
  claims-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claims-service
    ports:
      - "${PORT}:${PORT}"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    networks:
      - pacifico-network
    restart: unless-stopped
